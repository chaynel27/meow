<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      background-color: #0f172a;
      color: white;
      font-family: Arial;
      text-align: center;
    }

    h1 {
      color: #38bdf8;
    }

    button {
      background-color: #22c55e;
      border: none;
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
      border-radius: 8px;
    }

    button:hover {
      background-color: #16a34a;
    }

    #text {
      margin-top: 20px;
      font-size: 18px;
    }
  </style>
</head>

<body>
  <h1>My First Website</h1>

  <button onclick="changeText()">Click me</button>

  <p id="text">Nothing clicked yet</p>

  <script>
    function changeText() {
      document.getElementById("text").innerText =
        "You clicked the button 🎉";
    }
  </script>
</body>
</html>
