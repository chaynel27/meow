<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      background-color: #E6E6FA;
      color: #ADD8E6;
      font-family: times-new-roman;
      text-align: center;
    }

    h1 {
      color: #20B2AA;
    }

    button {
      background-color: #FFB6C1;
      border: none;
      padding: 10px 20px;
      font-size: 16px;
      cursor: none;
        border-radius: 8px;
    }

    button:hover {
      background-color: #16a34a;
    }

    #text {
      margin-top: 20px;
      font-size: 18px;
    }
  </style>
  }

  #cursor {
    position: fixed;
    pointer-events: none;
    font-size: 24px;
  }
</style>

<div id="cursor">🌸</div>

<script>
  document.addEventListener("mousemove", (e) => {
    const cursor = document.getElementById("cursor");
    cursor.style.left = e.pageX + "px";
    cursor.style.top = e.pageY + "px";
  });

    
</head>

<body>
  <h1>this is adhd procrastination 101🤷🏻‍♀️</h1>

  <button onclick="changeText()">Click me</button>

  <p id="text">click to meow</p>

  <script>
    function changeText() {
      document.getElementById("text").innerText =
        "MEOW CHANEL LOVES U :3";
    }
  </script>
</body>
</html>
